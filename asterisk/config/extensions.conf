[default]
; vazio


; =========================
; TESTE LOCAL
; =========================
[from-test]
exten => 1000,1,Answer()
 same => n,Playback(demo-congrats)
 same => n,Hangup()


; =========================
; INBOUND NVOIP -> TOCA EM AGENTES ONLINE (900-999)
; GRAVA:
;   - WAV misto
;   - WAV RX
;   - WAV TX
;   - MP3
;   - .ready no final
; =========================
[from-nvoip]
exten => s,1,NoOp(INBOUND NVOIP: ${CALLERID(all)} -> ${EXTEN})
 same => n,Set(RECORD_DIR=/var/spool/asterisk/monitor)
 same => n,Set(REC_BASE=${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${UNIQUEID}-${CALLERID(num)}-${EXTEN})

 same => n,Set(REC_WAV=${RECORD_DIR}/${REC_BASE}.wav)
 same => n,Set(REC_RX_WAV=${RECORD_DIR}/${REC_BASE}.rx.wav)
 same => n,Set(REC_TX_WAV=${RECORD_DIR}/${REC_BASE}.tx.wav)
 same => n,Set(REC_MP3=${RECORD_DIR}/${REC_BASE}.mp3)
 same => n,Set(REC_READY=${RECORD_DIR}/${REC_BASE}.ready)

 same => n,NoOp(REC_WAV=${REC_WAV})
 same => n,NoOp(REC_RX_WAV=${REC_RX_WAV})
 same => n,NoOp(REC_TX_WAV=${REC_TX_WAV})
 same => n,NoOp(REC_MP3=${REC_MP3})
 same => n,NoOp(REC_READY=${REC_READY})

 same => n,MixMonitor(${REC_WAV},b r(${REC_RX_WAV}) t(${REC_TX_WAV}),/opt/asterisk/scripts/postprocess_recording.sh ${REC_WAV} ${REC_MP3} ${REC_READY})
 same => n,Gosub(ring-agents-online,s,1)
 same => n,Hangup()

exten => _X.,1,NoOp(INBOUND NVOIP: ${CALLERID(all)} -> ${EXTEN})
 same => n,Set(RECORD_DIR=/var/spool/asterisk/monitor)
 same => n,Set(REC_BASE=${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${UNIQUEID}-${CALLERID(num)}-${EXTEN})

 same => n,Set(REC_WAV=${RECORD_DIR}/${REC_BASE}.wav)
 same => n,Set(REC_RX_WAV=${RECORD_DIR}/${REC_BASE}.rx.wav)
 same => n,Set(REC_TX_WAV=${RECORD_DIR}/${REC_BASE}.tx.wav)
 same => n,Set(REC_MP3=${RECORD_DIR}/${REC_BASE}.mp3)
 same => n,Set(REC_READY=${RECORD_DIR}/${REC_BASE}.ready)

 same => n,NoOp(REC_WAV=${REC_WAV})
 same => n,NoOp(REC_RX_WAV=${REC_RX_WAV})
 same => n,NoOp(REC_TX_WAV=${REC_TX_WAV})
 same => n,NoOp(REC_MP3=${REC_MP3})
 same => n,NoOp(REC_READY=${REC_READY})

 same => n,MixMonitor(${REC_WAV},b r(${REC_RX_WAV}) t(${REC_TX_WAV}),/opt/asterisk/scripts/postprocess_recording.sh ${REC_WAV} ${REC_MP3} ${REC_READY})
 same => n,Gosub(ring-agents-online,s,1)
 same => n,Hangup()


; =========================
; SUBROTINA: TOCAR SOMENTE RAMAIS ONLINE 900-999 (PJSIP)
; =========================
[ring-agents-online]
exten => s,1,NoOp(RING ONLINE AGENTS 900-999)
 same => n,Set(DIALSTR=)
 same => n,Set(i=900)

 same => n,While($[${i} <= 999])
 same => n,Set(CONTACTS=${PJSIP_DIAL_CONTACTS(${i})})
 same => n,GotoIf($["${CONTACTS}" = ""]?next)
 same => n,GotoIf($["${DIALSTR}" = ""]?first:add)
 same => n(first),Set(DIALSTR=${CONTACTS})
 same => n,Goto(next)
 same => n(add),Set(DIALSTR=${DIALSTR}&${CONTACTS})
 same => n(next),Set(i=$[${i} + 1])
 same => n,EndWhile()

 same => n,NoOp(DIALSTR final: ${DIALSTR})
 same => n,GotoIf($["${DIALSTR}" = ""]?no_agents)
 same => n,Dial(${DIALSTR},30,b(set-call-headers^s^1(${UNIQUEID}))tT)
 same => n,Return()

exten => no_agents,1,NoOp(Nenhum agente online 900-999)
 same => n,Playback(all-circuits-busy-now)
 same => n,Congestion()
 same => n,Return()

[set-call-headers]
exten => s,1,NoOp(Definindo headers SIP da chamada)
 same => n,Set(PJSIP_HEADER(add,X-Call-UniqueId)=${ARG1})
 same => n,NoOp(Header X-Call-UniqueId definido como ${ARG1})
 same => n,Return()

; =========================
; WEBRTC (900-999) -> SAÍDA PELA NVOIP
; =========================
[from-webrtc]
exten => 1000,1,Goto(from-test,1000,1)

exten => _0X.,1,NoOp(OUT WEBRTC->NVOIP: ${CALLERID(all)} discando ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@nvoip-out,60)
 same => n,Hangup()

exten => _+X.,1,NoOp(OUT WEBRTC->NVOIP: ${CALLERID(all)} discando ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@nvoip-out,60)
 same => n,Hangup()

exten => i,1,Playback(invalid)
 same => n,Hangup()

exten => t,1,Hangup()
