[default]
; vazio


; =========================
; TESTE LOCAL
; =========================
[from-test]
exten => 1000,1,Answer()
 same => n,Playback(demo-congrats)
 same => n,Hangup()


; =========================
; INBOUND NVOIP -> TOCA EM AGENTES ONLINE (900-999)
; GRAVA EM WAV E CONVERTE PARA MP3 AO FINAL
; =========================
[from-nvoip]
exten => s,1,NoOp(INBOUND NVOIP: ${CALLERID(all)} -> ${EXTEN})
 same => n,Set(RECORD_DIR=/var/spool/asterisk/monitor)
 same => n,Set(REC_BASE=${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${UNIQUEID}-${CALLERID(num)}-${EXTEN})
 same => n,MixMonitor(${RECORD_DIR}/${REC_BASE}.wav,b,/bin/sh -c "/usr/bin/ffmpeg -y -i ${RECORD_DIR}/${REC_BASE}.wav -codec:a libmp3lame -q:a 2 ${RECORD_DIR}/${REC_BASE}.mp3 && /bin/rm -f ${RECORD_DIR}/${REC_BASE}.wav")
 same => n,Gosub(ring-agents-online,s,1)
 same => n,Hangup()

exten => _X.,1,NoOp(INBOUND NVOIP: ${CALLERID(all)} -> ${EXTEN})
 same => n,Set(RECORD_DIR=/var/spool/asterisk/monitor)
 same => n,Set(REC_BASE=${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${UNIQUEID}-${CALLERID(num)}-${EXTEN})
 same => n,MixMonitor(${RECORD_DIR}/${REC_BASE}.wav,b,/bin/sh -c "/usr/bin/ffmpeg -y -i ${RECORD_DIR}/${REC_BASE}.wav -codec:a libmp3lame -q:a 2 ${RECORD_DIR}/${REC_BASE}.mp3 && /bin/rm -f ${RECORD_DIR}/${REC_BASE}.wav")
 same => n,Gosub(ring-agents-online,s,1)
 same => n,Hangup()


; =========================
; SUBROTINA: TOCAR SOMENTE RAMAIS ONLINE 900-999 (PJSIP)
; =========================
[ring-agents-online]
exten => s,1,NoOp(RING ONLINE AGENTS 900-999)
 same => n,Set(DIALSTR=)
 same => n,Set(i=900)

 same => n,While($[${i} <= 999])
 same => n,Set(CONTACTS=${PJSIP_DIAL_CONTACTS(${i})})
 same => n,GotoIf($["${CONTACTS}" = ""]?next)
 same => n,GotoIf($["${DIALSTR}" = ""]?first:add)
 same => n(first),Set(DIALSTR=${CONTACTS})
 same => n,Goto(next)
 same => n(add),Set(DIALSTR=${DIALSTR}&${CONTACTS})
 same => n(next),Set(i=$[${i} + 1])
 same => n,EndWhile()

 same => n,NoOp(DIALSTR final: ${DIALSTR})
 same => n,GotoIf($["${DIALSTR}" = ""]?no_agents)
 same => n,Dial(${DIALSTR},30,tT)
 same => n,Return()

exten => no_agents,1,NoOp(Nenhum agente online 900-999)
 same => n,Playback(all-circuits-busy-now)
 same => n,Congestion()
 same => n,Return()


; =========================
; WEBRTC (900-999) -> SAÍDA PELA NVOIP
; =========================
[from-webrtc]
exten => 1000,1,Goto(from-test,1000,1)

exten => _0X.,1,NoOp(OUT WEBRTC->NVOIP: ${CALLERID(all)} discando ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@nvoip-out,60)
 same => n,Hangup()

exten => _+X.,1,NoOp(OUT WEBRTC->NVOIP: ${CALLERID(all)} discando ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@nvoip-out,60)
 same => n,Hangup()

exten => i,1,Playback(invalid)
 same => n,Hangup()

exten => t,1,Hangup()
