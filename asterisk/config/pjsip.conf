[global]
type=global
user_agent=Asterisk-18

; NAT (áudio + sinalização)
external_media_address=147.15.55.243
external_signaling_address=147.15.55.243

; prioridade: primeiro casa por IP (trunk inbound), depois auth (ramais)
endpoint_identifier_order=ip,username,auth_username,username

local_net=10.0.0.0/8
local_net=172.16.0.0/12



; =========================
; TRANSPORTS
; =========================

[udp_transport]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_signaling_address=147.15.55.243
external_signaling_port=5060
external_media_address=147.15.55.243

[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088
external_signaling_address=147.15.55.243
external_signaling_port=8088
external_media_address=147.15.55.243

; =========================
; NVOIP - INBOUND (apenas entrada por IP)
; =========================

[nvoip-in]
type=endpoint
transport=udp_transport
context=from-nvoip
disallow=all
allow=alaw,ulaw,g729

direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
dtmf_mode=rfc4733

identify_by=ip

[nvoip-in-identify]
type=identify
endpoint=nvoip-in
match=54.233.253.44
match=18.231.18.98
match=52.67.248.54

[nvoip-registration]
type=registration
transport=udp_transport
outbound_auth=nvoip-auth
server_uri=sip:app.nvoip.com.br:5060
client_uri=sip:136849001@app.nvoip.com.br
retry_interval=60
forbidden_retry_interval=300
expiration=300
contact_user=136849001

; =========================
; NVOIP - OUTBOUND (apenas saída autenticada)
; =========================

[nvoip-auth]
type=auth
auth_type=userpass
username=136849001
password=7613f8c2

[nvoip-aor]
type=aor
contact=sip:app.nvoip.com.br:5060
qualify_frequency=60

[nvoip-out]
type=endpoint
transport=udp_transport
context=from-webrtc
disallow=all
allow=g729

aors=nvoip-aor
outbound_auth=nvoip-auth
from_user=136849001
from_domain=app.nvoip.com.br

direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
dtmf_mode=rfc4733


